name: Terraform Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      presets: ${{ steps.find-presets.outputs.dirs }}
      presets_with_tests: ${{ steps.find-testable.outputs.dirs }}
      examples: ${{ steps.find-examples.outputs.dirs }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - id: find-presets
        name: Discover preset modules
        run: |
          # Skip leading-underscore dirs (e.g. aws/_shared, gcp/_shared) —
          # they are internal helper buckets bundled by the composer, not
          # top-level presets. Mirrors composer.isInternalDirName and
          # tests/validate-as-child.sh::is_shared_path (issue #203).
          dirs=$(find aws gcp -mindepth 1 -maxdepth 1 -type d | sort | while read -r d; do
            base="$(basename "$d")"
            case "$base" in _*) continue ;; esac
            [ -f "$d/.validate-skip" ] || echo "$d"
          done | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "dirs=$dirs" >> "$GITHUB_OUTPUT"

      - id: find-testable
        name: Discover modules with non-integration terraform tests
        run: |
          # Only consider modules that have at least one non-integration
          # .tftest.hcl. Files matching *integration* are opt-in: they
          # require live cloud credentials and are skipped in CI.
          # Skip leading-underscore dirs (issue #203) for the same reason
          # find-presets does.
          dirs=$(find aws gcp -mindepth 1 -maxdepth 1 -type d | sort | while read -r d; do
            base="$(basename "$d")"
            case "$base" in _*) continue ;; esac
            non_integration=$(find "$d" -maxdepth 2 -name '*.tftest.hcl' ! -name '*integration*' 2>/dev/null | head -1)
            if [ -n "$non_integration" ]; then
              echo "$d"
            fi
          done | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "dirs=$dirs" >> "$GITHUB_OUTPUT"

      - id: find-examples
        name: Discover examples
        run: |
          dirs=$(find examples -mindepth 1 -maxdepth 1 -type d | sort | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "dirs=$dirs" >> "$GITHUB_OUTPUT"

  validate-presets:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir: ${{ fromJson(needs.discover.outputs.presets) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e  # v4.0.1
        with:
          terraform_version: "1.7.5"

      - name: Terraform Init
        run: terraform init -backend=false -input=false
        working-directory: ${{ matrix.dir }}

      - name: Terraform Validate
        run: terraform validate
        working-directory: ${{ matrix.dir }}

  validate-examples:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir: ${{ fromJson(needs.discover.outputs.examples) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e  # v4.0.1
        with:
          terraform_version: "1.7.5"

      - name: Terraform Init
        run: terraform init -backend=false -input=false
        working-directory: ${{ matrix.dir }}

      - name: Terraform Validate
        run: terraform validate
        working-directory: ${{ matrix.dir }}

  test-presets:
    needs: discover
    if: ${{ needs.discover.outputs.presets_with_tests != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir: ${{ fromJson(needs.discover.outputs.presets_with_tests) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e  # v4.0.1
        with:
          terraform_version: "1.7.5"

      - name: Terraform Init
        run: terraform init -backend=false -input=false
        working-directory: ${{ matrix.dir }}

      - name: Terraform Test (non-integration only)
        # Run every .tftest.hcl file in the module that does NOT contain
        # "integration" in its name. Integration tests require live cloud
        # credentials and are run manually, not in CI.
        run: |
          set -euo pipefail
          mapfile -t test_files < <(find . -maxdepth 2 -name '*.tftest.hcl' ! -name '*integration*' 2>/dev/null | sort)
          if [ "${#test_files[@]}" -eq 0 ]; then
            echo "No non-integration tests in this module."
            exit 0
          fi
          filter_args=()
          for f in "${test_files[@]}"; do
            filter_args+=("-filter=${f#./}")
          done
          terraform test -no-color "${filter_args[@]}"
        working-directory: ${{ matrix.dir }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Lint sensitive-in-for_each
        run: bash tests/lint-sensitive-for-each.sh

      - name: Lint apply-time-unknown values in for_each map keys (#163)
        run: bash tests/lint-foreach-unknown-keys.sh

      - name: Lint Project-tag coverage (AWS)
        run: bash tests/lint-project-tag.sh

      - name: Lint project-label coverage (GCP)
        run: bash tests/lint-project-label.sh

      - name: Lint label-less GCP resources for var.project name-prefix scoping (#215)
        run: bash tests/lint-labelless-name-prefix.sh

      - name: Lint GCP project = var.project_id pin coverage (#287)
        run: bash tests/lint-gcp-project-pin.sh

      - name: Lint root-only blocks (import / removed) in preset modules (#199)
        run: bash tests/lint-no-root-only-blocks.sh

      - name: Lint phantom-computed-fields denylist ↔ NOTE comments (#215)
        run: bash tests/lint-phantom-computed-fields.sh

      - name: Lint enrichgen override citation comments (#415)
        run: bash tests/lint-enrichgen-override-citations.sh

  # Validates phantom-computed-fields.txt against the live provider schema
  # pinned by schemas/providers.tf. Catches the failure mode where a
  # provider upgrade flips a field from pure-Computed to Optional+Computed
  # (or removes it entirely), silently invalidating the denylist that
  # sandbox-infrastructure-template's drift-check wrapper consumes (#215).
  verify-phantom-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e  # v4.0.1
        with:
          terraform_version: "1.7.5"

      - name: Verify phantom-computed-fields.txt against provider schema
        run: make verify-phantom-schema

  # Real Terraform linter — catches deprecated syntax, unused
  # declarations, provider-specific best-practice violations the custom
  # shell lints under tests/lint-*.sh don't model. Single runner, recursive
  # over the tree; plugins downloaded once. See .tflint.hcl for the
  # plugin pin and rule set.
  tflint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93  # v6.2.2
        with:
          tflint_version: latest

      - name: Init tflint plugins
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run tflint
        run: tflint --recursive --format=compact

  # Wraps each preset in a synthetic root and runs terraform init. This
  # is the actual consumption shape used by the InsideOut composer
  # (each preset is instantiated as a child module), and it surfaces
  # classes of failures that standalone `terraform validate` misses —
  # most notably the v0.7.0 `import {}` regression tracked in #199,
  # where the standalone preset directory was treated as the root
  # module and the invalid block silently passed CI.
  #
  # Matrix-fanned out one preset per runner (mirrors validate-presets) so
  # provider downloads happen in parallel rather than sequentially.
  validate-presets-as-child:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir: ${{ fromJson(needs.discover.outputs.presets) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e  # v4.0.1
        with:
          terraform_version: "1.7.5"

      - name: Validate ${{ matrix.dir }} wrapped as a child module
        run: bash tests/validate-as-child.sh "${{ matrix.dir }}"

  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e  # v4.0.1
        with:
          terraform_version: "1.7.5"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

  go-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - run: go build ./...

  go-vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - run: go vet ./...

  go-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      # Terraform is required by the integration tests in pkg/composer that
      # exercise terraform init/plan against composed bundles (e.g.
      # compose_gcp_vpc_plan_integration_test.go for issue #163). Tests skip
      # gracefully if it's missing; installing it ensures CI actually runs
      # them rather than silently skipping.
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e  # v4.0.1
        with:
          terraform_version: "1.7.5"
      - run: go test -race ./...

  # NOTE (#406): the previous localstack-discover-gate job was removed
  # alongside Bundle 13c. The unified discoverer routes every AWS
  # type through the Cloud Control API, which LocalStack Community
  # does not include (returns 501 / "not included within your
  # LocalStack license"). The gate's premise — end-to-end discover
  # round-trip against a free LocalStack — is no longer compatible
  # with the production code path. Pre-merge acceptance now relies
  # on live smoke against the test AWS account; long-term, a
  # Cloud-Control-aware integration test (real AWS sandbox or a
  # CC mock facade) is the replacement.

  # Re-runs cmd/imported-codegen against the committed filtered schemas
  # and fails if doing so produces a diff in pkg/composer/imported/generated
  # or schemas/. Catches stale generated output from a forgotten regen
  # after a generator change. Does NOT install terraform — schemas are
  # pre-canned in schemas/*.filtered.json.
  verify-gen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - run: make verify-gen

  # Single aggregator status for branch protection to require. Lets the
  # matrix jobs above grow/shrink without updating the protection rule.
  ci-gate:
    needs:
      - discover
      - validate-presets
      - validate-presets-as-child
      - validate-examples
      - test-presets
      - lint
      - format-check
      - go-build
      - go-vet
      - go-test
      - verify-gen
      - verify-phantom-schema
      - tflint
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all required jobs succeeded
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required CI jobs failed or were cancelled."
            exit 1
          fi
          echo "All required CI jobs passed."
